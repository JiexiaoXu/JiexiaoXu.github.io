---
layout: base
---

<article class="post-shell">
  <header class="post-header">
    <a class="back-link" href="{{ '/blog/' | relative_url }}">Blog</a>
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
